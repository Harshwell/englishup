name: Weekly Content Update

on:
  schedule:
    - cron: "0 19 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-content-update
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate secret
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY is not configured in repository secrets."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run content generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate

      - name: Commit updated content
        run: |
          git config user.name "EnglishUp Bot"
          git config user.email "bot@englishup.app"
          git add public/data/

          if git diff --staged --quiet; then
            echo "No content changes detected."
            exit 0
          fi

          git commit -m "chore: weekly content refresh [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
